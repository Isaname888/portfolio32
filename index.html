<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>MUSIN ISA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<!-- LANGUAGE SWITCH -->
<div class="language-toggle">
<input type="checkbox" id="langSwitch">

<label for="langSwitch" class="switch">
<span class="lang ru">RU</span>
<span class="lang en">EN</span>
</label>
</div>

<div class="center">

<h1 class="neon reveal"
data-ru="MUSIN ISA"
data-en="MUSIN ISA">
MUSIN ISA
</h1>

<p class="subtitle2 reveal"
data-ru="ВЕБ РАЗРАБОТЧИК • JAVA РАЗРАБОТЧИК • СОЗДАТЕЛЬ ИГР"
data-en="WEB DEVELOPER • JAVA DEVELOPER • GAME CREATOR">
WEB DEVELOPER • JAVA DEVELOPER • GAME CREATOR
</p>

<div class="buttons reveal">

<a href="about.html"
data-ru="ОБО МНЕ"
data-en="ABOUT">ABOUT</a>

<a href="skills.html"
data-ru="НАВЫКИ"
data-en="SKILLS">SKILLS</a>

<a href="projects.html"
data-ru="ПРОЕКТЫ"
data-en="PROJECTS">PROJECTS</a>

<a href="contact.html"
data-ru="КОНТАКТЫ"
data-en="CONTACT">CONTACT</a>

</div>

</div>

<div class="cursor"></div>

<script>
// курсор
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
cursor.style.left = e.clientX + "px";
cursor.style.top = e.clientY + "px";
});

// фон движение
document.addEventListener("mousemove", (e) => {
const bg = document.querySelector(".bg");
bg.style.transform =
`translate(${e.clientX * 0.02}px, ${e.clientY * 0.02}px)`;
});

// анимация появления
window.onload = () => {
document.querySelectorAll(".reveal").forEach((el, i) => {
setTimeout(() => {
el.style.opacity = "1";
el.style.transform = "translateY(0)";
}, i * 150);
});
};

// ПЕРЕКЛЮЧЕНИЕ ЯЗЫКА
const switcher = document.getElementById("langSwitch");

switcher.addEventListener("change", () => {

const lang = switcher.checked ? "en" : "ru";

document.querySelectorAll("[data-ru]").forEach(el => {
el.textContent = el.getAttribute("data-" + lang);
});

});

</script>

</body>
</html>
