<div class="cursor"></div>

<script>
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

document.addEventListener("mousemove", (e) => {
  const bg = document.querySelector(".bg");
  bg.style.transform =
    `translate(${e.clientX * 0.02}px, ${e.clientY * 0.02}px)`;
});

window.onload = () => {
  document.querySelectorAll(".reveal").forEach((el, i) => {
    setTimeout(() => {
      el.style.opacity = "1";
      el.style.transform = "translateY(0)";
    }, i * 150);
  });
};
</script>

</body>
  <div class="language-toggle">

<input type="checkbox" id="langSwitch">

<label for="langSwitch" class="switch">

<span class="lang ru">RU</span>

<span class="lang en">EN</span>

</label>

</div>


<script>

const switcher = document.getElementById("langSwitch");

switcher.addEventListener("change", () => {

const lang = switcher.checked ? "en" : "ru";

document.querySelectorAll("[data-ru]").forEach(el => {

el.textContent = el.getAttribute("data-" + lang);

});

});

</script>
  <div class="lang-switch">
    <button onclick="setLang('ru')" class="lang-btn">RU</button>
    <button onclick="setLang('en')" class="lang-btn">EN</button>
</div>

<script>

function setLang(lang){

document.querySelectorAll("[data-ru]").forEach(el=>{
el.textContent = el.getAttribute("data-"+lang)
})

}

</script>
