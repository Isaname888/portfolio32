<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>MUSIN ISA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<!-- LANGUAGE SWITCH -->
<div class="language-toggle">
<input type="checkbox" id="langSwitch">
<label for="langSwitch" class="switch">
<span class="lang ru">RU</span>
<span class="lang en">EN</span>
</label>
</div>

<div class="center">

<h1 class="neon reveal" data-i18n="name">MUSIN ISA</h1>

<p class="subtitle2 reveal" data-i18n="subtitle">
WEB DEVELOPER • JAVA DEVELOPER • GAME CREATOR
</p>

<div class="buttons reveal">

<a href="about.html" data-i18n="about">ABOUT</a>
<a href="skills.html" data-i18n="skills">SKILLS</a>
<a href="projects.html" data-i18n="projects">PROJECTS</a>
<a href="contact.html" data-i18n="contact">CONTACT</a>

</div>

</div>

<div class="cursor"></div>

<script>

// ===== CURSOR =====
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
cursor.style.left = e.clientX + "px";
cursor.style.top = e.clientY + "px";
});

// ===== BACKGROUND MOVE =====
document.addEventListener("mousemove", (e) => {
const bg = document.querySelector(".bg");
bg.style.transform =
`translate(${e.clientX * 0.02}px, ${e.clientY * 0.02}px)`;
});

// ===== ANIMATION =====
window.onload = () => {
document.querySelectorAll(".reveal").forEach((el, i) => {
setTimeout(() => {
el.style.opacity = "1";
el.style.transform = "translateY(0)";
}, i * 150);
});
};

// ===== TRANSLATION SYSTEM =====
const dict = {
ru: {
name: "МУСИН ИСА",
subtitle: "ВЕБ РАЗРАБОТЧИК • JAVA РАЗРАБОТЧИК • СОЗДАТЕЛЬ ИГР",
about: "ОБО МНЕ",
skills: "НАВЫКИ",
projects: "ПРОЕКТЫ",
contact: "КОНТАКТЫ"
},

en: {
name: "MUSIN ISA",
subtitle: "WEB DEVELOPER • JAVA DEVELOPER • GAME CREATOR",
about: "ABOUT",
skills: "SKILLS",
projects: "PROJECTS",
contact: "CONTACT"
}
};

const switcher = document.getElementById("langSwitch");

function setLang(lang){
document.querySelectorAll("[data-i18n]").forEach(el=>{
const key = el.getAttribute("data-i18n");
el.textContent = dict[lang][key];
});
}

switcher.addEventListener("change", () => {
setLang(switcher.checked ? "en" : "ru");
});

// default language
setLang("en");

</script>

</body>
</html>
